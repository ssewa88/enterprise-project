apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-hello-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ssewa88/enterprise-project.git
    targetRevision: main
    path: helm/hello-app

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
